{% macro comments_section(article) %}
<section class="nn-comments">
    <h2 class="nn-comments__title">Comentarios</h2>
    <p class="nn-comments__intro">
        ¿Qué te ha parecido? Escríbenos tu comentario y lo revisaremos antes de publicarlo.
    </p>

    <div class="nn-comments__box">
        <form
            class="nn-comment-form"
            id="nn-comment-form"
            action="https://formspree.io/f/mkokjgka"
            method="POST">

            <input type="hidden" name="_subject" value="Nuevo comentario en Napkin Notes">
            <input type="hidden" name="articulo" value="{{ article.title }}">
            <input type="hidden" name="url_articulo" value="{{ SITEURL }}/{{ article.url }}">

            <div class="nn-comment-form__row">
                <label for="comment-name">Nombre</label>
                <input id="comment-name" type="text" name="nombre" required>
            </div>

            <div class="nn-comment-form__row">
                <label for="comment-email">Email (opcional)</label>
                <input id="comment-email" type="email" name="email">
            </div>

            <div class="nn-comment-form__row">
                <label for="comment-text">Comentario</label>
                <textarea id="comment-text" name="comentario" rows="6" required></textarea>
            </div>

            <p id="nn-comment-form-status" class="nn-comment-form__status"></p>

            <button class="nn-home-sidebar__button" type="submit">Enviar comentario</button>
        </form>
    </div>
</section>
{% endmacro %}

{% macro comments_script() %}
<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("nn-comment-form");
    const status = document.getElementById("nn-comment-form-status");
    if (!form || !status) return;

    async function handleSubmit(event) {
        event.preventDefault();

        const data = new FormData(form);
        status.textContent = "Enviando...";

        try {
            const response = await fetch(form.action, {
                method: form.method,
                body: data,
                headers: {
                    "Accept": "application/json"
                }
            });

            if (response.ok) {
                status.textContent = "Comentario enviado. Lo revisaremos antes de publicarlo.";
                form.reset();
            } else {
                const result = await response.json();
                if (result && result.errors) {
                    status.textContent = result.errors.map(error => error.message).join(", ");
                } else {
                    status.textContent = "No se pudo enviar el comentario.";
                }
            }
        } catch (error) {
            status.textContent = "No se pudo enviar el comentario.";
        }
    }

    form.addEventListener("submit", handleSubmit);
});
</script>
{% endmacro %}
